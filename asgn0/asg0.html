<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ASG0</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    canvas {
      background: black;
      display: block;
      margin-bottom: 12px;
    }

    .controls {
      margin-bottom: 10px;
    }

    input, select, button {
      margin: 4px;
    }
  </style>
</head>
<body onload="main()">
  <canvas id="example" width="400" height="400">
    Please use a browser that supports canvas
  </canvas>

  <div class="controls">
    <h3>Vector 1 (red)</h3>
    <label>X1: <input type="number" id="x1" value="2.25" step="any"></label>
    <label>Y1: <input type="number" id="y1" value="2.25" step="any"></label>
  </div>

  <div class="controls">
    <h3>Vector 2 (blue)</h3>
    <label>X2: <input type="number" id="x2" value="1" step="any"></label>
    <label>Y2: <input type="number" id="y2" value="1" step="any"></label>
  </div>

  <div class="controls">
    <button onclick="handleDrawEvent()">Draw</button>
  </div>

  <div class="controls">
    <label>Operation:
      <select id="operation">
        <option value="add">Add</option>
        <option value="sub">Subtract</option>
        <option value="mul">Multiply</option>
        <option value="div">Divide</option>
        <option value="magnitude">Magnitude</option>
        <option value="normalize">Normalize</option>
        <option value="angle">Angle between</option>
        <option value="area">Area</option>
      </select>
    </label>

    <label>Scalar:
      <input type="number" id="scalar" value="2" step="any">
    </label>

    <button onclick="handleDrawOperationEvent()">Perform Operation</button>
  </div>

  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
</body>
</html>
